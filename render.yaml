# Render deployment config for Galveston Virtual Offices (Next.js 16)
# Render → New → Blueprint (or Web Service) → connect this repo.
services:
  - type: web
    name: galvestonvirtualoffices
    runtime: node
    plan: starter
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      # Public values (publishable/anon key ships in the browser — safe to commit)
      - key: NEXT_PUBLIC_SUPABASE_URL
        value: https://pljqnaxowvhkzyeybqal.supabase.co
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        value: sb_publishable_IxytxErVh-M73nUld5sQgA_LNRfdKQ0
      - key: NEXT_PUBLIC_DEFAULT_TENANT
        value: galveston
      # Secret — set this one in the Render dashboard, never commit it
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
